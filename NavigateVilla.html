<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Woodsvale Navigation</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:80px;
}

input{
font-size:20px;
padding:10px;
width:200px;
}

button{
font-size:20px;
padding:10px 20px;
margin-top:20px;
}

</style>

</head>

<body>

<h2>Woodsvale Navigation</h2>

<p> Villa Number (e.g 253)</p>

<input id="house" placeholder="Villa Number">

<br>

<button onclick="navigate()">Navigate</button>

<script>

const houses = {

"253": {lat:12.8824525,lng:77.7929727},
"254": {lat:12.912555,lng:77.654421},
"255": {lat:12.912765,lng:77.654531}

}

function navigate(){

let house=document.getElementById("house").value

if(houses[house]){

let lat=houses[house].lat
let lng=houses[house].lng

window.location.href=
`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`

}

else{

alert("House number not found")

}

}

</script>

</body>
</html>
