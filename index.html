<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Woodsvale Navigation</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:80px;
}

input{
font-size:20px;
padding:10px;
width:200px;
}

button{
font-size:20px;
padding:10px 20px;
margin-top:20px;
}

</style>

</head>

<body>

<h2>Woodsvale Navigation</h2>

<p> Villa Number (e.g 253)</p>

<input id="house" placeholder="Villa Number">

<br>

<button onclick="navigate()">Navigate</button>

<script>

const houses = {

"253": {lat:12.8824525,lng:77.7929727},
"254": {lat:12.882549,lng:77.792915},
"255": {lat:12.882619,lng:77.792867},
"205": {lat:12.882742,lng:77.792335},
"204": {lat:12.882674,lng:77.792158},
"151": {lat:12.882396,lng:77.791764},
"212": {lat:12.882068,lng:77.792812},
"213": {lat:12.882068,lng:77.792812},
"170": {lat:12.8821877,lng:77.7907838},
"158": {lat:12.882394,lng:77.791011},
"215": {lat:12.881684,lng:77.793000},
"206": {lat:12.882561,lng:77.792457},
"244": {lat:12.882210,lng:77.793735},
"75": {lat:12.885023,lng:77.77.792080},
"83": {lat:12.883914,lng:77.791804},
"154": {lat:12.882116,lng:77.791208}
}

function navigate(){

let house=document.getElementById("house").value

if(houses[house]){

let lat=houses[house].lat
let lng=houses[house].lng

window.location.href=
`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`

}

else{

alert("House number not found")

}

}

</script>

</body>
</html>
